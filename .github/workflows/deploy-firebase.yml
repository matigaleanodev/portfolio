name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  PROCESS_RELEASE_FUNCTION_NAME: ${{ vars.PORTFOLIO_CLOUD_PROCESS_RELEASE_FUNCTION_NAME || 'portfolio-cloud-dev-process-release' }}
  PUBLISH_CHAT_KNOWLEDGE_FUNCTION_NAME: ${{ vars.PORTFOLIO_CLOUD_PUBLISH_CHAT_KNOWLEDGE_FUNCTION_NAME || 'portfolio-cloud-dev-publish-chat-knowledge' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build content artifacts
        run: npm run build:content

      - name: Build Angular app
        run: npm run build

      - name: Build release manifest
        run: npm run build:release-manifest

      - name: Build chat knowledge payload
        run: npm run build:chat-knowledge-payload

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Invoke portfolio-cloud process-release
        run: |
          aws lambda invoke \
            --function-name "${PROCESS_RELEASE_FUNCTION_NAME}" \
            --invocation-type RequestResponse \
            --cli-binary-format raw-in-base64-out \
            --payload file://.generated/release-manifest.json \
            .generated/process-release-response.json \
            > .generated/process-release-metadata.json

          node -e "const fs=require('node:fs'); const metadata=JSON.parse(fs.readFileSync('.generated/process-release-metadata.json','utf8')); if (metadata.FunctionError || metadata.StatusCode !== 200) { console.error('process-release invocation failed', metadata); process.exit(1); }"

      - name: Invoke portfolio-cloud publish-chat-knowledge
        run: |
          aws lambda invoke \
            --function-name "${PUBLISH_CHAT_KNOWLEDGE_FUNCTION_NAME}" \
            --invocation-type RequestResponse \
            --cli-binary-format raw-in-base64-out \
            --payload file://.generated/chat/knowledge-payload.json \
            .generated/publish-chat-knowledge-response.json \
            > .generated/publish-chat-knowledge-metadata.json

          node -e "const fs=require('node:fs'); const metadata=JSON.parse(fs.readFileSync('.generated/publish-chat-knowledge-metadata.json','utf8')); if (metadata.FunctionError || metadata.StatusCode !== 200) { console.error('publish-chat-knowledge invocation failed', metadata); process.exit(1); }"

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-${{ github.sha }}
          path: .generated/release-manifest.json

      - name: Upload chat knowledge artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-knowledge-${{ github.sha }}
          path: .generated/chat/knowledge.json

      - name: Upload chat knowledge payload
        uses: actions/upload-artifact@v4
        with:
          name: chat-knowledge-payload-${{ github.sha }}
          path: .generated/chat/knowledge-payload.json

      - name: Upload process-release response
        uses: actions/upload-artifact@v4
        with:
          name: process-release-response-${{ github.sha }}
          path: |
            .generated/process-release-metadata.json
            .generated/process-release-response.json

      - name: Upload publish-chat-knowledge response
        uses: actions/upload-artifact@v4
        with:
          name: publish-chat-knowledge-response-${{ github.sha }}
          path: |
            .generated/publish-chat-knowledge-metadata.json
            .generated/publish-chat-knowledge-response.json
