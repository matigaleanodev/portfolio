name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build content artifacts
        run: npm run build:content

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          CI: true
        run: npm test

      - name: Build
        run: npm run build

      - name: Build release manifest
        run: npm run build:release-manifest

      - name: Build chat knowledge payload
        run: npm run build:chat-knowledge-payload

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: .generated/release-manifest.json

      - name: Upload chat knowledge artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chat-knowledge
          path: |
            .generated/chat/knowledge.json
            .generated/chat/knowledge-payload.json
