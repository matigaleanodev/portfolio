<article class="project-card">
  <div class="project-card__backdrop" aria-hidden="true"></div>

  <div class="project-card__meta-band">
    <span class="project-card__index">0{{ index() }}</span>
    <span class="project-card__label">Product Case</span>
  </div>

  <div
    class="project-card__media"
  >
    <img
      [src]="project().coverImage"
      [alt]="project().title"
      loading="lazy"
      decoding="async"
      class="w-full h-full object-cover"
    />
  </div>

  <div class="project-card__content">
    <header class="project-card__header">
      <h3 class="project-card__title">
        {{ project().title }}
      </h3>

      <p class="project-card__excerpt">
        {{ project().excerpt }}
      </p>
    </header>

    @if (project().stack.length) {
      <div class="project-card__stack">
        <span class="sr-only">{{ project().stack.join(' · ') }}</span>
        @for (tech of project().stack; track tech) {
          <span class="project-tech-chip">{{ tech }}</span>
        }
      </div>
    }

    <div class="project-card__links">
      @for (link of project().links; track link.url) {
        <a
          [href]="link.url"
          target="_blank"
          rel="noopener noreferrer"
          (click)="trackProjectClick(link.label)"
          [attr.aria-label]="link.label + ' de ' + project().title"
          class="project-link inline-flex items-center gap-2 text-sm font-medium hover:text-(--color-accent) transition"
        >
          <lucide-icon [img]="iconFor(link.icon ?? '')" size="16" aria-hidden="true" />
          {{ link.label }}
        </a>
      }
    </div>
  </div>
</article>
